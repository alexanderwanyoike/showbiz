name: CI
on:
  push:
    branches: [main, dev]
    tags: ["v*"]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "LICENSE"
  pull_request:
    branches: [dev, electron-migration]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libx11-dev mpv
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v1-rust
      - name: Download mpv sidecar
        run: cd src-tauri/binaries && chmod +x download-mpv.sh && ./download-mpv.sh
      - run: cargo test --verbose
        working-directory: src-tauri

  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test

  # Electron build verification — runs on PRs and dev pushes to catch
  # packaging failures early. No artifacts are persisted (only release
  # builds persist artifacts).
  build-check:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: [test-rust, test-typescript]
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn package:electron --publish never

  # Tauri remains the fallback shell for one release after the Electron
  # cutover; verify it still builds on the cheapest platform until the
  # Phase 5 deletion sweep removes it.
  build-check-tauri:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: [test-rust, test-typescript]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v1-rust
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libx11-dev mpv
      - name: Download mpv sidecar
        run: cd src-tauri/binaries && chmod +x download-mpv.sh && ./download-mpv.sh
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: yarn tauri
          args: --target x86_64-unknown-linux-gnu

  # Release build — only on tag push. Builds Electron installers and
  # attaches them to a CI-created draft GitHub Release.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-rust, test-typescript]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Set version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          rm -f package.json.bak src-tauri/tauri.conf.json.bak src-tauri/Cargo.toml.bak
      - run: yarn package:electron --publish never
      - name: Upload installers to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            See the assets below to download the installer for your platform.
          draft: true
          prerelease: false
          files: |
            dist-package/*.AppImage
            dist-package/*.deb
            dist-package/*.dmg
            dist-package/*.exe
