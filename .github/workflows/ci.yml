name: CI
on:
  push:
    branches: [main, dev]
    tags: ["v*"]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "LICENSE"
  pull_request:
    branches: [dev]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libx11-dev mpv
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v1-rust
      - name: Download mpv sidecar
        run: cd src-tauri/binaries && chmod +x download-mpv.sh && ./download-mpv.sh
      - run: cargo test --verbose
        working-directory: src-tauri

  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test

  # Build verification — runs on PRs and dev pushes to catch build failures early.
  # No artifacts are persisted (only release builds persist artifacts).
  build-check:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: [test-rust, test-typescript]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v1-rust
      - if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libx11-dev mpv
      - if: startsWith(matrix.platform, 'macos')
        run: brew install meson ninja pkg-config ffmpeg libplacebo libass
      - name: Download mpv sidecar
        shell: bash
        run: cd src-tauri/binaries && chmod +x download-mpv.sh && ./download-mpv.sh
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: yarn tauri
          args: --target ${{ matrix.target }}

  # Release build — only on tag push. Persists artifacts via GitHub Release.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-rust, test-typescript]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v1-rust
      - if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libx11-dev mpv
      - if: startsWith(matrix.platform, 'macos')
        run: brew install meson ninja pkg-config ffmpeg libplacebo libass
      - name: Download mpv sidecar
        shell: bash
        run: cd src-tauri/binaries && chmod +x download-mpv.sh && ./download-mpv.sh
      - name: Set version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          rm -f src-tauri/tauri.conf.json.bak src-tauri/Cargo.toml.bak package.json.bak
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: yarn tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download the installer for your platform.
          releaseDraft: true
          prerelease: false
